<div class="hidden lg:block text-sm border-b border-gray-100 bg-white">
  <div class="container mx-auto px-4">
    <div class="flex justify-between items-center h-10">
      <div class="flex items-center gap-6 text-gray-500">
        <span class="flex items-center gap-2">
          <i class="fa-solid fa-truck text-primary-600 text-xs"></i>
          <span>Free Shipping on Orders 500 EGP</span>
        </span>
        <span class="flex items-center gap-2">
          <i class="fa-solid fa-gift text-primary-600 text-xs"></i>
          <span>New Arrivals Daily</span>
        </span>
      </div>

      <div class="flex items-center gap-6">
        <div class="flex items-center gap-4 text-gray-500">
          <a
            href="tel:+18001234567"
            class="flex items-center gap-1.5 hover:text-primary-600 transition-colors"
          >
            <i class="fa-solid fa-phone text-xs"></i>
            <span>+1 (800) 123-4567</span>
          </a>
          <a
            href="mailto:support@freshcart.com"
            class="flex items-center gap-1.5 hover:text-primary-600 transition-colors"
          >
            <i class="fa-regular fa-envelope text-xs"></i>
            <span>support@freshcart.com</span>
          </a>
        </div>
        <span class="w-px h-4 bg-gray-200"></span>
        <div class="flex items-center gap-3 text-gray-400">
          <a href="#" class="hover:text-primary-600"><i class="fa-brands fa-facebook-f"></i></a>
          <a href="#" class="hover:text-primary-600"><i class="fa-brands fa-instagram"></i></a>
          <a href="#" class="hover:text-primary-600"><i class="fa-brands fa-x-twitter"></i></a>
        </div>
      </div>
    </div>
  </div>
</div>

<header class="sticky top-0 z-40 bg-white/80 backdrop-blur-md shadow-sm">
  <div class="container mx-auto px-4">
    <div class="flex items-center justify-between h-16 lg:h-20 gap-4">
      <a routerLink="/" class="shrink-0">
        <img src="assets/images/freshcart-logo.svg" alt="FreshCart" class="h-8 lg:h-9 w-auto" />
      </a>

      <form class="hidden lg:flex flex-1 max-w-xl mx-8">
        <div class="relative w-full group">
          <input
            type="text"
            placeholder="Search for products..."
            class="w-full px-5 py-2.5 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:ring-4 focus:ring-primary-600/5 focus:border-primary-600 transition-all outline-none text-sm"
          />
          <button
            type="submit"
            class="absolute right-1.5 top-1/2 -translate-y-1/2 w-8 h-8 rounded-lg bg-primary-600 text-white flex items-center justify-center hover:bg-primary-700 transition-all"
          >
            <i class="fa-solid fa-magnifying-glass text-xs"></i>
          </button>
        </div>
      </form>

      <nav class="hidden xl:flex items-center gap-8 text-secondary font-medium">
        <a
          routerLink="/home"
          routerLinkActive="text-primary-600"
          class="hover:text-primary-600 transition-colors"
          >Home</a
        >
        <a
          routerLink="/shop"
          routerLinkActive="text-primary-600"
          class="hover:text-primary-600 transition-colors"
          >Shop</a
        >
        <a
          routerLink="/categories"
          routerLinkActive="text-primary-600"
          class="hover:text-primary-600 transition-colors"
          >Categories</a
        >
        <a
          routerLink="/brands"
          routerLinkActive="text-primary-600"
          class="hover:text-primary-600 transition-colors"
          >Brands</a
        >
      </nav>

      <div class="flex items-center gap-2 lg:gap-4">
        <a
          routerLink="/wishlist"
          class="relative p-2 text-gray-600 hover:bg-gray-50 rounded-full transition-all group"
        >
          <i class="fa-regular fa-heart text-xl group-hover:text-danger"></i>
          @if (wishCount() > 0) {
            <span
              class="absolute top-0 right-0 w-4 h-4 bg-danger text-white text-[10px] flex items-center justify-center rounded-full"
              >{{ wishCount() }}</span
            >
          }
        </a>

        <a
          routerLink="/cart"
          class="relative p-2 text-gray-600 hover:bg-gray-50 rounded-full transition-all group"
        >
          <i class="fa-solid fa-cart-shopping text-xl group-hover:text-primary-600"></i>
          @if (count() > 0) {
            <span
              class="absolute top-0 right-0 w-4 h-4 bg-primary-600 text-white text-[10px] flex items-center justify-center rounded-full"
              >{{ count() }}</span
            >
          }
        </a>

        <div class="hidden lg:flex items-center gap-2 ml-2 border-l pl-4 border-gray-100">
          @if (logged()) {
            <button
              (click)="logOut()"
              class="text-sm font-semibold text-secondary hover:text-primary-600 transition-colors"
            >
              Sign Out
            </button>
          } @else {
            <a
              routerLink="/login"
              class="text-sm font-semibold text-secondary hover:text-primary-600 transition-colors"
              >Sign In</a
            >
            <a
              routerLink="/register"
              class="bg-primary-600 hover:bg-primary-700 text-white px-5 py-2.5 rounded-xl text-sm font-semibold transition-all shadow-md shadow-primary-600/20"
              >Sign Up</a
            >
          }
        </div>

        <button
          (click)="isMenuOpen = !isMenuOpen"
          class="lg:hidden w-10 h-10 flex items-center justify-center rounded-xl bg-gray-50 text-secondary"
        >
          <i
            [class]="isMenuOpen ? 'fa-solid fa-xmark' : 'fa-solid fa-bars-staggered'"
            class="text-xl"
          ></i>
        </button>
      </div>
    </div>
  </div>
</header>
@if (isMenuOpen) {
  <div class="fixed inset-0 z-50 lg:hidden">
    <div class="fixed inset-0 bg-secondary/40 backdrop-blur-sm" (click)="isMenuOpen = false"></div>
    <div class="fixed top-0 right-0 h-full w-72 bg-white shadow-2xl p-6 transition-transform">
      <div class="flex flex-col gap-6">
        <img src="assets/images/freshcart-logo.svg" alt="FreshCart" class="h-8 w-fit mb-4" />
        <a
          routerLink="/home"
          routerLinkActive="text-primary-600"
          class="text-lg font-medium border-b pb-2 border-gray-50 hover:text-primary-600"
          >Home</a
        >
        <a
          routerLink="/shop"
          routerLinkActive="text-primary-600"
          class="text-lg font-medium border-b pb-2 border-gray-50 hover:text-primary-600"
          >Shop</a
        >
        <a
          routerLink="/login"
          class="text-center py-3 rounded-xl border-2 hover:text-gray-50 hover:bg-primary-600 border-primary-600 text-primary-600 font-bold"
          >Sign In</a
        >
      </div>
    </div>
  </div>
}
