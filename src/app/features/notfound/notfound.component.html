<div
  class="relative min-h-screen overflow-hidden bg-gray-50/50 flex items-center justify-center px-6"
>
  <div
    class="absolute top-0 right-0 -mt-20 -mr-20 h-96 w-96 rounded-full bg-primary-100/50 blur-3xl animate-pulse"
  ></div>
  <div
    class="absolute bottom-0 left-0 -mb-20 -ml-20 h-96 w-96 rounded-full bg-secondary/5 blur-3xl animate-pulse"
    style="animation-delay: 2s"
  ></div>

  <div class="absolute inset-0 pointer-events-none opacity-20 hidden md:block">
    <i
      class="fa-solid fa-cart-shopping absolute top-[15%] left-[10%] text-4xl text-primary-400 animate-bounce"
    ></i>
    <i
      class="fa-solid fa-bag-shopping absolute bottom-[20%] right-[15%] text-5xl text-secondary animate-bounce"
      style="animation-delay: 1s"
    ></i>
    <i
      class="fa-solid fa-star absolute top-[40%] right-[10%] text-2xl text-yellow-400 animate-pulse"
    ></i>
  </div>

  <div class="relative z-10 text-center max-w-2xl">
    <div class="relative inline-block mb-8">
      <h1
        class="text-[12rem] md:text-[15rem] font-black text-white leading-none drop-shadow-2xl select-none"
      >
        404
      </h1>
      <div class="absolute inset-0 flex items-center justify-center">
        <div
          class="h-32 w-32 md:h-40 md:w-40 bg-white rounded-[2.5rem] shadow-2xl flex items-center justify-center rotate-12 transition-transform hover:rotate-0 duration-500 ring-8 ring-primary-50"
        >
          <i class="fa-solid fa-magnifying-glass text-6xl md:text-7xl text-primary-600"></i>
        </div>
      </div>
    </div>

    <div class="space-y-6">
      <h2 class="text-4xl md:text-5xl font-black text-secondary tracking-tight">
        Oops! Page <span class="text-primary-600">Not Found</span>
      </h2>

      <div class="flex flex-col sm:flex-row items-center justify-center gap-4 pt-6">
        <a
          routerLink="/"
          class="w-full sm:w-auto px-10 py-4 bg-secondary text-white rounded-2xl font-black text-lg shadow-xl shadow-secondary/20 hover:bg-primary-600 hover:scale-105 transition-all flex items-center justify-center gap-3 group"
        >
          <i class="fa-solid fa-house group-hover:animate-bounce"></i>
          Back to Home
        </a>

        <button
          (click)="goBack()"
          class="w-full sm:w-auto px-10 py-4 bg-white text-secondary border-2 border-gray-100 rounded-2xl font-black text-lg hover:bg-gray-50 hover:border-primary-200 transition-all flex items-center justify-center gap-3 group"
        >
          <i class="fa-solid fa-arrow-left group-hover:-translate-x-1 transition-transform"></i>
          Go Back
        </button>
      </div>
    </div>

    <div
      class="mt-16 p-6 bg-white/50 backdrop-blur-sm rounded-[2rem] border border-white/50 shadow-sm max-w-lg mx-auto"
    >
      <span class="text-xs uppercase tracking-widest font-black text-gray-400 mb-4 block italic"
        >Maybe you were looking for?</span
      >
      <div class="flex flex-wrap justify-center gap-3">
        <a
          routerLink="/shop"
          class="px-4 py-2 bg-white rounded-xl text-sm font-bold text-secondary shadow-sm hover:text-primary-600 transition-colors"
          >Shop</a
        >
        <a
          routerLink="/categories"
          class="px-4 py-2 bg-white rounded-xl text-sm font-bold text-secondary shadow-sm hover:text-primary-600 transition-colors"
          >Categories</a
        >
        <a
          routerLink="/cart"
          class="px-4 py-2 bg-white rounded-xl text-sm font-bold text-secondary shadow-sm hover:text-primary-600 transition-colors"
          >My Cart</a
        >
      </div>
    </div>
  </div>
</div>
