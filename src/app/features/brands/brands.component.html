<div class="min-h-screen bg-gray-50/50">
  <header
    class="relative overflow-hidden bg-gradient-to-br from-secondary to-slate-800 py-16 text-white shadow-lg"
  >
    <div class="absolute -right-20 -top-20 h-64 w-64 rounded-full bg-primary-500/10 blur-3xl"></div>
    <div
      class="absolute -left-20 -bottom-20 h-64 w-64 rounded-full bg-emerald-500/10 blur-3xl"
    ></div>

    <div class="container relative z-10 mx-auto px-6">
      <nav class="mb-6 flex items-center gap-3 text-sm font-medium text-gray-400">
        <a routerLink="/" class="transition-colors hover:text-primary-500"> Home </a>
        <i class="fa-solid fa-chevron-right text-[10px] opacity-50"></i>
        <span class="text-white">All Brands</span>
      </nav>

      <div class="flex items-center gap-6">
        <div
          class="flex h-20 w-20 items-center justify-center rounded-[2rem] bg-white/10 shadow-2xl backdrop-blur-md ring-1 ring-white/20"
        >
          <i class="fa-solid fa-copyright text-4xl text-primary-500"></i>
        </div>
        <div>
          <h1 class="text-4xl font-black tracking-tight sm:text-5xl">
            Our <span class="text-primary-500">Brands</span>
          </h1>
          <p class="mt-2 text-lg font-medium text-gray-400 text-pretty">
            Partnering with the world's most trusted names to bring you quality
          </p>
        </div>
      </div>
    </div>
  </header>

  <main class="container mx-auto px-6 py-12">
    <div class="grid grid-cols-2 gap-6 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6">
      @for (brand of brandsList(); track brand._id) {
        <a
          [routerLink]="['/shop']"
          [queryParams]="{ brand: brand._id, slug: brand.slug }"
          class="group relative flex flex-col items-center justify-center rounded-[2.5rem] border border-gray-100 bg-white p-8 shadow-sm transition-all duration-500 hover:-translate-y-2 hover:border-primary-200 hover:shadow-2xl hover:shadow-primary-600/10 cursor-pointer"
        >
          <div
            class="relative aspect-square w-full overflow-hidden rounded-[1.5rem] flex items-center justify-center bg-gray-50/50 p-4"
          >
            <img
              [src]="brand.image"
              [alt]="brand.name"
              class="max-h-full max-w-full object-contain grayscale transition-all duration-500 group-hover:grayscale-0 group-hover:scale-110"
            />
          </div>

          <h3
            class="mt-6 text-center font-black text-secondary transition-colors group-hover:text-primary-600"
          >
            {{ brand.name }}
          </h3>

          <div
            class="mt-2 flex items-center gap-2 text-[10px] font-extrabold uppercase tracking-widest text-gray-400 opacity-0 transition-all duration-500 group-hover:opacity-100 group-hover:text-primary-600"
          >
            <span>View Collection</span>
            <i class="fa-solid fa-arrow-right-long"></i>
          </div>
        </a>
      }
    </div>
  </main>
</div>
