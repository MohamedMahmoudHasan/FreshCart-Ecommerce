<section id="categories" class="py-16 bg-white">
  <div class="container mx-auto px-4">
    <div class="flex flex-col md:flex-row justify-between items-end md:items-center mb-12 gap-4">
      <div class="flex items-center gap-4">
        <div
          class="h-10 w-2 bg-linear-to-b from-primary-600 to-primary-700 rounded-full shadow-sm shadow-primary-600/20"
        ></div>
        <div>
          <h2 class="text-3xl font-black text-secondary tracking-tight">
            Shop By <span class="text-primary-600">Category</span>
          </h2>
          <p class="text-gray-400 text-xs mt-1 font-medium">Discover our wide range of products</p>
        </div>
      </div>

      <a
        routerLink="/categories"
        class="group flex items-center gap-2 text-primary-600 font-bold hover:text-primary-700 transition-all"
      >
        View All Categories
        <i class="fa-solid fa-arrow-right group-hover:translate-x-1 transition-transform"></i>
      </a>
    </div>

    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 xl:grid-cols-6 gap-6">
      @for (category of categoriesList(); track category._id) {
        <a
          class="group relative flex flex-col items-center p-6 bg-gray-50/50 rounded-3xl border border-transparent hover:border-primary-100 hover:bg-white hover:shadow-xl hover:shadow-primary-600/5 transition-all duration-300 cursor-pointer"
          [routerLink]="['/shop']"
          [queryParams]="{ category: category._id, slug: category.slug }"
        >
          <div class="relative w-24 h-24 mb-4">
            <div
              class="absolute inset-0 bg-primary-600 opacity-0 group-hover:opacity-10 group-hover:scale-125 rounded-full transition-all duration-500"
            ></div>

            <div
              class="relative w-full h-full overflow-hidden bg-white rounded-full border-4 border-white shadow-sm group-hover:shadow-md group-hover:-translate-y-1 transition-all duration-300"
            >
              <img
                [src]="category.image"
                [alt]="category.name"
                class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"
              />
            </div>
          </div>

          <h3
            class="text-secondary font-bold text-sm group-hover:text-primary-600 transition-colors"
          >
            {{ category.name }}
          </h3>

          <div
            class="mt-2 w-0 group-hover:w-8 h-1 bg-primary-600 rounded-full transition-all duration-300"
          ></div>
        </a>
      }
    </div>
  </div>
</section>
