<section class="py-16 bg-gray-50/50">
  <div class="container mx-auto px-4">
    <div class="flex items-center justify-between mb-10">
      <div class="flex items-center gap-4">
        <div
          class="h-10 w-2 bg-linear-to-b from-emerald-500 to-emerald-700 rounded-full shadow-sm shadow-emerald-200"
        ></div>
        <div>
          <h2 class="text-3xl font-black text-gray-800 tracking-tight">
            Featured <span class="text-emerald-600">Products</span>
          </h2>
          <p class="text-gray-400 text-xs mt-1 font-medium">Explore our top picks for this week</p>
        </div>
      </div>
      <button class="text-emerald-600 font-bold text-sm hover:underline transition-all">
        View All <i class="fa-solid fa-arrow-right ml-1"></i>
      </button>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-8">
      @for (product of productList(); track product._id) {
        <app-product-card [product]="product"></app-product-card>
      }
    </div>
  </div>
</section>
